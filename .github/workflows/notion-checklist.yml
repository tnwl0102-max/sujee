name: 업무 체크리스트 슬랙 브리핑

on:
  workflow_dispatch: # cron-job.org에서 매일 8시 KST에 트리거

jobs:
  checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 슬랙 브리핑 전송
        working-directory: automation
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHECKLIST_SLACK_CHANNEL: ${{ secrets.CHECKLIST_SLACK_CHANNEL }}
        run: node notion-checklist.js
